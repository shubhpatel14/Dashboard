services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: trishula
      POSTGRES_USER: trishula
      POSTGRES_PASSWORD: trishula
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
